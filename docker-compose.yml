version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data

  mc:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}); do sleep 2; done;
      /usr/bin/mc mb -p local/lakehouse || true;
      /usr/bin/mc mb -p local/otel || true;
      tail -f /dev/null
      "

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.4
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr=PLAINTEXT://redpanda:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports: ["19092:19092", "8082:8082", "9644:9644"]
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.5
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
    ports: ["8081:8080"]
    depends_on: [redpanda]

  api:
    build: ./services/api
    environment:
      DATABASE_URL: postgresql+psycopg://assessment:assessment@postgres:5432/assessment
      REDPANDA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports: ["8000:8000"]
    depends_on: [postgres, redpanda, otel-collector]
    volumes:
      - ./services/api:/app

  ui:
    build: ./apps/ui
    ports: ["5173:5173"]
    depends_on: [api]
    volumes:
      - ./apps/ui:/app
      - /app/node_modules

  spark:
    build: ./services/spark
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      ICEBERG_WAREHOUSE: s3a://lakehouse/warehouse
      REDPANDA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on: [redpanda, minio, otel-collector]
    volumes:
      - ./services/spark:/app

  trino:
    image: trinodb/trino:460
    ports: ["8080:8080"]
    depends_on: [minio]
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
      - ./infra/trino/config.properties:/etc/trino/config.properties:ro
      - ./infra/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./infra/trino/node.properties:/etc/trino/node.properties:ro

  superset:
    image: apache/superset:4.1.2
    ports: ["8088:8088"]
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    depends_on: [postgres, trino]
    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./infra/superset/init.sh:/app/init.sh:ro
    command: ["/bin/bash", "/app/init.sh"]

  prometheus:
    image: prom/prometheus:v3.2.1
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/config.yml"]
    ports: ["3100:3100"]
    volumes:
      - ./infra/loki/config.yml:/etc/loki/config.yml:ro

  tempo:
    image: grafana/tempo:2.8.1
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports: ["3200:3200", "4319:4317"]
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro

  grafana:
    image: grafana/grafana:11.6.0
    ports: ["3000:3000"]
    depends_on: [prometheus, loki, tempo]
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports: ["4317:4317", "4318:4318", "9464:9464"]
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

volumes:
  postgres_data:
  minio_data:
  redpanda_data:
  grafana_data:
